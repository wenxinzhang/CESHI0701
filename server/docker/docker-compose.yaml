services:
  # ==================== MySQL ====================
  mysql:
    container_name: agentpm-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: "Asia/Shanghai"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-agentpm}"
      MYSQL_USER: "${MYSQL_USER:-agentpm}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - agentpm
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  # ==================== Redis ====================
  redis:
    container_name: agentpm-redis
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    networks:
      - agentpm
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  # ==================== Backend ====================
  backend:
    container_name: agentpm-backend
    # 拉取 GitHub Actions 构建好的后端镜像（在 .env 配置 BACKEND_IMAGE）
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      TZ: "Asia/Shanghai"
      NODE_ENV: "production"
      SERVER_PORT: "9001"
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?charset=utf8mb4"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_DB: "0"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_ACCESS_EXPIRE: "7200"
      JWT_REFRESH_EXPIRE: "1296000"
    ports:
      - "${BACKEND_PORT:-9001}:9001"
    volumes:
      # 上传文件持久化（镜像内 /app/uploads 已授权给运行用户，首次挂载继承其属主）
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentpm
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9001/admin/open/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ==================== Nginx ====================
  nginx:
    container_name: agentpm-nginx
    # 前端镜像（nginx + 已 baked 的静态产物与配置，在 .env 配置 FRONTEND_IMAGE）
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # 静态产物与 nginx.conf 已打进镜像；仅保留证书目录挂载供 HTTPS 使用
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - agentpm
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  agentpm:
    driver: bridge
